<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;cursor:none;}
.cursor{
  position:fixed;z-index:99999;pointer-events:none;
  width:6px;height:6px;border-radius:50%;
  background:var(--rose);
  transform:translate(-50%,-50%);
  transition:transform .15s ease, opacity .2s ease, width .2s ease, height .2s ease;
  mix-blend-mode:multiply;
}
.cursor.hover{width:20px;height:20px;background:rgba(232,150,138,.25);border:1px solid var(--rose);}
.cursor.click{width:4px;height:4px;background:var(--rose-deep);}
:root{
  --cream:#fdf8f3;--warm:#faf0e6;--rose:#e8968a;--rose-deep:#c9685c;
  --gold:#d4a96a;--ink:#2c2018;--ink-soft:#5c4a38;--muted:#a08878;
  --border:rgba(44,32,24,0.09);--white:#fffcf8;--sage:#b8cdb5;--sage-deep:#7a9e76;
}

/* ── ベース ── */
html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;}

/* ── ページ切り替え ── */
.page{display:none;}
.page.show{display:block;}

.w-overlay{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(
    to bottom,
    rgba(20,12,8,.4) 0%,
    rgba(20,12,8,.15) 30%,
    rgba(20,12,8,.45) 55%,
    rgba(20,12,8,.65) 75%,
    rgba(253,248,243,.95) 100%
  );
}
.w-blob{position:absolute;border-radius:50%;pointer-events:none;}
.w-blob1{display:none;}
.w-blob2{display:none;}
.w-blob3{display:none;}
@keyframes blobF{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

.w-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:68px 36px 56px;max-width:430px;margin:0 auto;width:100%;}
.w-eyebrow{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.4em;color:var(--gold);font-weight:300;margin-bottom:20px;text-shadow:0 2px 12px rgba(0,0,0,.4);}

@keyframes charFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes mistReveal{0%{opacity:0;letter-spacing:.15em;}100%{opacity:1;letter-spacing:.06em;}}

.w-logo{line-height:.92;margin-bottom:6px;}
.w-char{display:inline-block;font-family:'Satisfy',cursive;font-size:72px;font-weight:400;color:#fdf8f3;line-height:.92;opacity:0;text-shadow:0 2px 20px rgba(0,0,0,.3);animation:charFade 1.1s cubic-bezier(.4,0,.15,1) both;}

.w-rule{display:flex;align-items:center;gap:12px;margin:26px 0;}
.w-rl{flex:1;height:1px;background:linear-gradient(to right,rgba(253,248,243,.2),transparent);}
@keyframes ruleFade{from{opacity:0;}to{opacity:1;}}
.w-rule{animation:ruleFade 1s ease 2.2s both;}
.w-rl.r{background:linear-gradient(to left,rgba(253,248,243,.2),transparent);}
.w-ri{font-size:13px;color:rgba(253,248,243,.6);}

.w-tagline{font-family:'Shippori Mincho B1',serif;font-size:21px;font-weight:400;line-height:2.1;color:#fdf8f3;letter-spacing:.06em;text-shadow:0 2px 20px rgba(0,0,0,.8);}
.w-tl{display:inline-block;opacity:0;animation:mistReveal 1.0s ease both;}
.w-tl-hl{color:#f5c4b8;text-shadow:0 2px 20px rgba(0,0,0,.8);font-weight:600;}
.w-sub{margin-top:14px;font-size:12px;font-weight:400;color:rgba(253,248,243,.9);line-height:1.9;letter-spacing:.06em;text-shadow:0 1px 12px rgba(0,0,0,.8);}

.w-bottom{margin-top:auto;padding-top:40px;}
.w-time{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(253,248,243,.75);letter-spacing:.15em;margin-bottom:22px;}
.w-time::before{content:'';display:block;width:20px;height:1px;background:linear-gradient(to right,rgba(253,248,243,.6),transparent);}

.btn-start{display:inline-flex;align-items:center;gap:14px;background:var(--ink);color:var(--cream);border:none;padding:17px 32px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;font-weight:400;letter-spacing:.2em;cursor:pointer;border-radius:50px;transition:all .35s;box-shadow:0 8px 28px rgba(44,32,24,.18);}
.btn-start:hover{background:var(--rose-deep);transform:translateY(-2px);}
.btn-start .arr{transition:transform .3s;}
.btn-start:hover .arr{transform:translateX(5px);}

/* ────────────────────
   PAGE 2: QUESTION
──────────────────── */
#page-question{display:none;flex-direction:column;min-height:100vh;background:#faf7f4;;}
#page-question.show{display:flex;}

.q-head{
  flex-shrink:0;
  background:linear-gradient(160deg,#f5ede3 0%,#f8f1e8 40%,#faf7f4 100%);
  padding:52px 36px 40px;
  position:relative;
  max-width:430px;margin:0 auto;width:100%;
}


/* プログレスバー：細い1本線 */
.q-prog{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.q-num{
  font-family:'Cormorant Garamond',serif;
  font-size:12px;letter-spacing:.4em;
  color:var(--gold);font-weight:300;flex-shrink:0;
  opacity:.9;
}
.q-dots{display:flex;gap:4px;flex:1;}
.qdot{
  flex:1;height:1px;border-radius:1px;
  background:rgba(44,32,24,.12);
  transition:all .6s cubic-bezier(.4,0,.2,1);
}
.qdot.done{background:var(--rose);opacity:.7;}
.qdot.active{background:var(--rose);opacity:1;height:2px;}

/* 質問アイコン非表示 */
.q-icon{display:none;}

/* 質問テキスト */
.q-text{
  font-family:'Shippori Mincho B1',serif;
  font-size:27px;font-weight:400;
  line-height:1.65;color:var(--ink);
  letter-spacing:.05em;white-space:pre-line;
}
.q-hint{
  margin-top:10px;font-size:11px;font-weight:300;
  color:var(--muted);letter-spacing:.15em;
  font-family:'Cormorant Garamond',serif;
}

/* スクロールエリア */
.q-scroll{
  flex:1;overflow-y:auto;
  padding:8px 0 20px;
  max-width:430px;margin:0 auto;width:100%;
  position:relative;
}
.q-scroll::-webkit-scrollbar{display:none;}
.opts{display:flex;flex-direction:column;}

/* 選択肢：ラインで区切るリスト形式 */
.opt{
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(44,32,24,.07);
  border-radius:0;
  padding:20px 36px;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;
  cursor:pointer;
  font-family:'Shippori Mincho B1',serif;
  font-size:16px;font-weight:400;
  color:var(--ink-soft);
  letter-spacing:.04em;
  text-align:left;width:100%;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  -webkit-user-select:none;user-select:none;
  position:relative;overflow:hidden;
}
.opt::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:0;
  background:linear-gradient(to right,rgba(232,150,138,.08),transparent);
  transition:width .4s cubic-bezier(.4,0,.2,1);
}
.opt:first-child{border-top:1px solid rgba(44,32,24,.07);}
.opt:hover{color:var(--ink);padding-left:44px;}
.opt:hover::before{width:100%;}
.opt.selected{
  color:var(--rose-deep);
  background:rgba(232,150,138,.04);
  padding-left:44px;
}
.opt.selected::before{width:100%;background:linear-gradient(to right,rgba(232,150,138,.1),transparent);}
.opt-e{display:none;}
.opt-l{flex:1;line-height:1.5;}
.opt-chk{

.opt.selected .opt-chk{

/* 次へボタン */
.q-next-area{flex-shrink:0;padding:16px 36px 40px;max-width:430px;margin:0 auto;width:100%;display:none;}
.q-next-area.show{display:block;}
.btn-next{

}
.btn-next::before{

/* その他入力 */

/* ローディング */

.ld-dots{display:flex;gap:10px;}
.ld-dot{

}
.ld-dot:nth-child(2){animation-delay:.2s;}
.ld-dot:nth-child(3){animation-delay:.4s;}
@keyframes ldPulse{0%,80%,100%{opacity:.3;transform:scale(1)}40%{opacity:.8;transform:scale(1.4)}}
.ld-txt{
  font-family:'Shippori Mincho B1',serif;

/* ────────────────────
   PAGE 3: FINISH (最終ページ)
──────────────────── */

#page-finish.show{display:flex;}

.fin-wrap{flex:1;display:flex;flex-direction:column;max-width:430px;margin:0 auto;width:100%;}

.fin-hero{

}
.fin-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(232,150,138,.15),transparent 70%);}
.fin-hero::after{content:'✿';position:absolute;left:20px;bottom:10px;font-size:60px;color:rgba(232,150,138,.08);line-height:1;}

/* 回答サマリー */

/* AIプロポーザル */
.fin-proposal{margin:12px 28px 28px;background:linear-gradient(160deg,#fff8f5,#fffaf0);border:1.5px solid rgba(232,150,138,.22);border-radius:22px;padding:26px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(232,150,138,.1);}
.fin-proposal::before{content:'✿';position:absolute;right:16px;bottom:8px;font-size:52px;color:rgba(232,150,138,.1);line-height:1;}

/* 戻るボタン */

   STYLIST PAGE

#page-stylist.show{display:flex;}

.s-head{background:linear-gradient(160deg,var(--warm) 0%,var(--cream) 100%);padding:52px 32px 28px;border-bottom:1px solid var(--border);max-width:430px;margin:0 auto;width:100%;}
.s-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4px;}
.s-logo{font-family:'Shippori Mincho B1',serif;font-size:26px;font-weight:800;color:var(--ink);}
.s-logo em{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;color:var(--rose);}
.s-badge{font-size:9px;letter-spacing:.22em;color:var(--sage-deep);border:1.5px solid var(--sage);padding:5px 11px;border-radius:20px;}

.c-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:20px 22px;margin-bottom:12px;display:flex;gap:16px;transition:all .25s;box-shadow:0 2px 14px rgba(44,32,24,.04);position:relative;overflow:hidden;}
.c-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--rose),var(--gold));border-radius:2px 0 0 2px;}

.c-pill{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(232,150,138,.1),rgba(212,169,106,.1));border:1px solid rgba(232,150,138,.2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--rose-deep);}

/* ── TOGGLE ── */
.vtoggle{display:none;}
.tgl{background:transparent;border:none;color:var(--muted);padding:9px 20px;font-size:11px;font-family:'Zen Kaku Gothic New',sans-serif;letter-spacing:.12em;cursor:pointer;transition:all .3s;border-radius:40px;white-space:nowrap;font-weight:300;}
.tgl.active{background:var(--ink);color:var(--cream);box-shadow:0 4px 12px rgba(44,32,24,.2);}

/* ── PARTICLES ── */
.ptcl{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;animation:ptclRing .7s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes ptclRing{
  0%{opacity:.8;transform:translate(-50%,-50%) scale(0);}
  60%{opacity:.4;}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>
<body>

<!-- ════ PAGE 1: WELCOME ════ -->
<div id="page-welcome" class="page show">
  <div class="w-photo"></div>
  <div class="w-overlay"></div>
  <div class="w-blob w-blob1"></div>
  <div class="w-blob w-blob2"></div>
  <div class="w-blob w-blob3"></div>
  <div class="w-inner">
    <div style="flex:1;">
      <div class="w-eyebrow">DRs · HAIR COUNSELING</div>
      <div class="w-logo">
        <span class="w-char" style="animation-delay:.3s">K</span><span class="w-char" style="animation-delay:.75s">n</span><span class="w-char" style="animation-delay:1.2s">o</span><span class="w-char" style="animation-delay:1.65s">w</span>
      </div>
      <div class="w-rule">
        <div class="w-rl"></div><span class="w-ri">✿</span><div class="w-rl r"></div>
      </div>
      <div class="w-tagline">
        <span class="w-tl" style="animation-delay:2.4s">わたしを、</span><br>
        <span class="w-tl w-tl-hl" style="animation-delay:3.0s">もっと好きに。</span>
      </div>
      <div class="w-sub">あなたのことをもっと深く知るための<br>カウンセリングを始めましょう。</div>
    </div>
    <div class="w-bottom">
      <div class="w-time">所要時間 約1分</div>
      <button class="btn-start" onclick="startCounseling()">
        カウンセリングを始める <span class="arr">→</span>
      </button>

</div>

<!-- ════ PAGE 2: QUESTION ════ -->
<div id="page-question" class="page">
  <div class="q-head">
    <div class="q-prog">
      <div class="q-num" id="q-num">01 / 06</div>
      <div class="q-dots" id="q-dots"></div>
    </div>
    <div class="q-icon" id="q-icon">💆‍♀️</div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
  </div>
  <div class="q-scroll">
    <div class="opts" id="opts"></div>
    <div class="q-loading" id="q-loading">
      <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
      <div class="ld-txt">次の質問を考えています…</div>
    </div>

  <div class="other-wrap" id="other-wrap">
    <textarea class="other-input" id="other-input" rows="2" placeholder="その他・自由にご記入ください"></textarea>

</div>

<!-- ════ PAGE 3: FINISH ════ -->
<div id="page-finish" class="page">
  <div class="fin-wrap">

    <div class="fin-hero">
      <div class="fin-icon">🌸</div>
      <div class="fin-thanks">THANK YOU</div>
      <div class="fin-title">
        カウンセリングにご協力いただき<br>
        <span>ありがとうございます。</span>
      </div>
      <div class="fin-divider"></div>
      <div class="fin-wish">
        今日のあなたに合ったご提案を<br>
        スタッフよりお伝えさせていただきます。<br><br>
        <strong>今日のお時間が、<br>素敵なひとときになりますように。</strong>
      </div>
    </div>

    <div class="fin-summary" id="fin-summary"></div>

    <div class="fin-proposal" id="fin-proposal">
      <div class="fp-label">おうちでできるケアアドバイス</div>
      <div class="fp-loading" id="fp-loading">
        <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
        <span>アドバイスを作成中…</span>
      </div>
      <div class="fp-txt" id="fp-txt" style="display:none;"></div>
    </div>

    <div class="fin-footer">
      <button class="btn-back" onclick="goWelcome()">← はじめに戻る</button>
    </div>

  </div>
</div>

<!-- ════ STYLIST ════ -->
<div id="page-stylist" class="page">
  <div class="s-head">
    <div class="s-top">
      <div class="s-logo">DRs <em>Know</em></div>
      <div class="s-badge">STYLIST VIEW</div>
    </div>
    <div class="s-sub">本日のお客様一覧</div>
  </div>
  <div class="s-list" id="s-list"></div>
</div>

<div class="vtoggle">
  <button class="tgl active" id="tgl-c" onclick="switchView('customer')">🌸 お客様</button>
  <button class="tgl" id="tgl-s" onclick="switchView('stylist')">✦ スタイリスト</button>
</div>

<script>
// ── 初期固定質問 ──
const INIT_QS = [
  {id:'name',icon:'🌸',text:'お名前を\n教えてください。',type:'text',hint:'例：山田 花子',
   opts:[]},
  {id:'gender',icon:'🌸',text:'性別を\n教えてください。',type:'single',
   opts:[{e:'👩',l:'女性'},{e:'👨',l:'男性'},{e:'🌿',l:'その他・回答しない'}]},
  {id:'age',icon:'✨',text:'年代を\n教えてください。',type:'single',
   opts:[{e:'🌱',l:'10代'},{e:'🌿',l:'20代'},{e:'🍃',l:'30代'},{e:'🌲',l:'40代'},{e:'🌳',l:'50代以上'}]},
  {id:'menu',icon:'💇‍♀️',text:'本日ご希望の\nメニューは？',type:'multi',hint:'複数選択できます',
   opts:[{e:'✂️',l:'カット'},{e:'🎨',l:'カラー'},{e:'🌀',l:'パーマ'},{e:'✨',l:'トリートメント'},{e:'🫧',l:'ヘッドスパ'}]},
  {id:'talk_style',icon:'💬',text:'施術中のお会話は\いかがですか？',type:'single',hint:'スタッフへの大切な情報になります',
   opts:[{e:'',l:'たくさん話したい'},{e:'',l:'適度に話したい'},{e:'',l:'必要なことだけでOK'},{e:'',l:'静かに過ごしたい'}]},
];

// future_menuは最後に固定で追加
const TAIL_QS = [
  {id:'future_menu',icon:'🌟',text:'今後やってみたい\n施術はありますか？',type:'multi',hint:'複数選択できます',
   opts:[{e:'🎨',l:'カラー・ハイライト'},{e:'🌀',l:'パーマ'},{e:'✨',l:'トリートメント'},{e:'🫧',l:'ヘッドスパ'},{e:'💆',l:'頭皮ケア・スカルプ'},{e:'🌿',l:'特になし'}]},
];

const BURST = ['✿','✦','🌸','⭐','💛','🤍','✨'];
let QS = [...INIT_QS];
let cur = 0, answers = {}, multiSel = [];
let clients = [
  {time:'10:00',name:'田中 様',menu:'カット・カラー',concern:'乾燥・パサつき',sug:'集中補修トリートメントをご提案'},
  {time:'11:30',name:'鈴木 様',menu:'ヘッドスパ',concern:'抜け毛・薄毛',sug:'スカルプケアをご提案'},
];

// ── ページ切り替え ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  window.scrollTo(0, 0);
}

function goWelcome() {
  showPage('page-welcome');
  document.getElementById('tgl-c').classList.add('active');
  document.getElementById('tgl-s').classList.remove('active');
}

function switchView(v) {
  document.getElementById('tgl-c').classList.toggle('active', v === 'customer');
  document.getElementById('tgl-s').classList.toggle('active', v === 'stylist');
  if (v === 'stylist') { renderStylist(); showPage('page-stylist'); }
  else showPage('page-welcome');
}

// ── パーティクル ──
function burst(x, y) {
  // 外側リング
  const ring1 = document.createElement('div');
  ring1.className = 'ptcl';
  ring1.style.cssText = `left:${x}px;top:${y}px;width:40px;height:40px;border:1px solid rgba(232,150,138,.6);background:transparent;`;
  document.body.appendChild(ring1);
  setTimeout(() => ring1.remove(), 750);
  // 内側リング（少し遅れて）
  const ring2 = document.createElement('div');
  ring2.className = 'ptcl';
  ring2.style.cssText = `left:${x}px;top:${y}px;width:22px;height:22px;border:1px solid rgba(212,169,106,.5);background:transparent;animation-delay:.08s;`;
  document.body.appendChild(ring2);
  setTimeout(() => ring2.remove(), 850);
  // 中心の小さい点
  const dot = document.createElement('div');
  dot.className = 'ptcl';
  dot.style.cssText = `left:${x}px;top:${y}px;width:5px;height:5px;background:var(--rose);animation-delay:.04s;`;
  document.body.appendChild(dot);
  setTimeout(() => dot.remove(), 750);
}

// ── カウンセリング開始 ──
function startCounseling() {
  cur = 0; answers = {};
  QS = [...INIT_QS];
  showPage('page-question');
  renderQ();
}

// ── 質問レンダリング ──
function pad(n) { return String(n).padStart(2, '0'); }

function renderDots() {
  const el = document.getElementById('q-dots');
  el.innerHTML = '';
  const total = Math.max(QS.length, 6);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'qdot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    el.appendChild(d);
  }
}

function renderQ() {
  const q = QS[cur];
  document.getElementById('q-num').textContent = `${pad(cur+1)} / ${pad(QS.length)}`;
  const icon = document.getElementById('q-icon');
  icon.textContent = q.icon;
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'iconPop .5s cubic-bezier(.175,.885,.32,1.275) both';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint || '';
  renderDots();
  multiSel = [];
  document.getElementById('q-next-area').classList.remove('show');
  document.getElementById('other-wrap').classList.remove('show');
  document.getElementById('other-input').value = '';
  document.getElementById('q-loading').style.display = 'none';

  const container = document.getElementById('opts');
  container.innerHTML = '';

  // テキスト入力タイプの処理
  if(q.type === 'text'){
    const wrap = document.createElement('div');
    wrap.style.cssText = 'padding:20px 36px;';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.hint || 'ご記入ください';
    input.id = 'text-answer';
    input.setAttribute('style', 'width:100%;padding:14px 0;background:transparent;border:none;border-bottom:1.5px solid rgba(44,32,24,.2);font-family:Shippori Mincho B1,serif;font-size:18px;font-weight:400;color:var(--ink);letter-spacing:.06em;outline:none;transition:border-color .3s;');
    input.addEventListener('focus', ()=>{ input.style.borderBottomColor='var(--rose)'; });
    input.addEventListener('blur', ()=>{ input.style.borderBottomColor='rgba(44,32,24,.2)'; });
    input.addEventListener('input', ()=>{
      document.getElementById('q-next-area').classList.toggle('show', input.value.trim().length > 0);
    });
    // Enterキーで次へ
    input.addEventListener('keydown', e=>{
      if(e.key==='Enter' && input.value.trim()){
        answers[q.id] = input.value.trim();
        advance();
      }
    });
    wrap.appendChild(input);
    container.appendChild(wrap);
    setTimeout(()=>input.focus(), 300);
    // 次へボタンで進む処理をオーバーライド
    document.getElementById('q-next-area').onclick = ()=>{
      const val = document.getElementById('text-answer')?.value.trim();
      if(val){ answers[q.id]=val; advance(); }
    };
    return;
  }
  // 通常の選択肢
  q.opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-e">${o.e}</span><span class="opt-l">${o.l}</span><span class="opt-chk">✓</span>`;
    if (q.type === 'single') {
      b.onclick = ev => {
        burst(ev.clientX, ev.clientY);
        b.classList.add('selected', 'pop');
        // その他欄を非表示にリセット
        document.getElementById('other-wrap').classList.remove('show');
        document.getElementById('other-input').value = '';
        answers[q.id] = o.l;
        setTimeout(() => advance(), 300);
      };
    } else {
      b.onclick = ev => {
        burst(ev.clientX, ev.clientY);
        const on = b.classList.toggle('selected');
        b.classList.add('pop');
        setTimeout(() => b.classList.remove('pop'), 300);
        if (on) multiSel.push(o.l); else multiSel = multiSel.filter(x => x !== o.l);
        document.getElementById('q-next-area').classList.toggle('show', multiSel.length > 0);
      };
    }
    container.appendChild(b);
  });

  // 「その他」ボタンを全質問に追加
  const otherBtn = document.createElement('button');
  otherBtn.className = 'opt';
  otherBtn.innerHTML = `<span class="opt-e">✏️</span><span class="opt-l">その他・自由に記入する</span><span class="opt-chk">✓</span>`;
  otherBtn.onclick = ev => {
    burst(ev.clientX, ev.clientY);
    const wrap = document.getElementById('other-wrap');
    const input = document.getElementById('other-input');
    const isShow = wrap.classList.toggle('show');
    otherBtn.classList.toggle('selected', isShow);
    otherBtn.classList.add('pop');
    setTimeout(() => otherBtn.classList.remove('pop'), 300);
    if (isShow) {
      input.value = '';
      setTimeout(() => input.focus(), 100);
      document.getElementById('q-next-area').classList.add('show');
    } else {
      input.value = '';
      // multiの場合はmultiSelの状態に戻す
      if (q.type !== 'single') {
        document.getElementById('q-next-area').classList.toggle('show', multiSel.length > 0);
      }
    }
  };
  container.appendChild(otherBtn);
}

function doMultiNext() {
  const otherVal = document.getElementById('other-input').value.trim();
  const base = multiSel.join('・');
  answers[QS[cur].id] = otherVal ? (base ? base + '・' + otherVal : otherVal) : base;
  document.getElementById('other-wrap').classList.remove('show');
  document.getElementById('other-input').value = '';
  // next-areaのonclickをデフォルトに戻す
  document.getElementById('q-next-area').onclick = null;
  advance();
}

// ── 進む ──

          {id:'cut_style',text:'スタイルの方向性を教えてください。',type:'single',hint:'',opts:[{e:'',l:'今と同じスタイルをキープ'},{e:'',l:'軽くしてほしい'},{e:'',l:'ボリュームを出したい'},{e:'',l:'スタイリストにお任せ'}]}

      if (menu.includes('パーマ')) {

          {id:'perm_style',text:'どんなウェーブ感にしたいですか？',type:'single',hint:'',opts:[{e:'',l:'ゆるふわ・ナチュラル'},{e:'',l:'しっかりカール'},{e:'',l:'ストレートパーマ'},{e:'',l:'おまかせ'}]}
        );
      }
      if (menu.includes('ヘッドスパ')) {
        fallback.push(
          {id:'spa_concern',text:'頭皮のお悩みを教えてください。',type:'multi',hint:'複数選択できます',opts:[{e:'',l:'かゆみ・フケ'},{e:'',l:'べたつき・においが気になる'},{e:'',l:'抜け毛・薄毛が気になる'},{e:'',l:'疲れ・ストレスを感じている'},{e:'',l:'特になし・リラックスしたい'}]}
        );
      }
      if (menu.includes('トリートメント')) {
        fallback.push(
          {id:'treat_concern',text:'特に気になる髪のお悩みは？',type:'single',hint:'',opts:[{e:'',l:'乾燥・パサつき'},{e:'',l:'カラー・パーマのダメージ'},{e:'',l:'まとまらない・広がる'},{e:'',l:'ツヤが欲しい'}]}
        );
      }
      // 共通
      fallback.push(
        {id:'lifestyle',text:'シャンプーはいつしますか？',type:'single',hint:'',opts:[{e:'',l:'朝シャン派'},{e:'',l:'夜シャン派'},{e:'',l:'朝夜両方'},{e:'',l:'気分によって'}]},
        {id:'homecare',text:'自宅でのヘアケアを教えてください。',type:'single',hint:'',opts:[{e:'',l:'シャンプーのみ'},{e:'',l:'シャンプー＋トリートメント'},{e:'',l:'ヘアオイルも使っている'},{e:'',l:'ほぼケアしていない'}]},

// ── スプレッドシートへ保存 ──
async function saveToSpreadsheet(ans, aiAdvice) {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxbZK47RlK_w92N3vNiR04EUZUGMQQ0bJZUTC5NYS5VQHkeGbQ9PU8f3oY9_PwBPTtj/exec';
  try {
    const payload = {
      name: ans.name || '',
      gender: ans.gender || '',
      age: ans.age || '',
      menu: ans.menu || '',
      talk_style: ans.talk_style || '',
      future_menu: ans.future_menu || '',
      ai_advice: aiAdvice || '',
      other: JSON.stringify(Object.fromEntries(Object.entries(ans).filter(([k])=>!['name','gender','age','menu','talk_style','future_menu'].includes(k))))
    };
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.error('スプレッドシート保存エラー:', e);
  }
}

// ── AI: 質問生成 ──
async function generateNextQuestions(ans) {
  const summary = Object.entries(ans).map(([k,v])=>`${k}: ${v}`).join('\n');
  const prompt = `あなたはトップクラスの美容室カウンセラーです。以下のお客様の回答を深く分析し、本当に必要な情報を引き出す質問を6〜7問生成してください。

【これまでの回答】
${summary}

【質問設計の哲学】
単なるアンケートではなく、お客様の「本音」と「潜在ニーズ」を引き出す質問を作ること。
表面的な回答の裏にある悩みや願望を掘り下げること。

【必須で聞くこと】
1. メニュー別の深掘り（必ず含める）
   - カラー含む→「今の髪色に満足していますか？」「色落ちが気になる時期は？」「理想のイメージに近い芸能人や写真はありますか？」
   - カット含む→「今の髪型で一番不満な部分は？」「朝のスタイリングに何分かけていますか？」「なりたいイメージは？」
   - パーマ含む→「過去のパーマで失敗した経験は？」「どんなシーンで映えるスタイルにしたいですか？」
   - ヘッドスパ含む→「ストレスや疲れを感じていますか？」「頭皮が気になり始めたきっかけは？」
   - トリートメント含む→「髪のどの部分が一番ダメージを感じますか？」「理想の髪質は？」

2. ライフスタイルの把握（必ず1問）
   - 朝のシャンプーか夜か・スタイリングにかける時間・仕事やライフスタイル

3. ホームケアの現状（必ず1問）
   - 使っているシャンプーやトリートメントの種類・ドライヤーの使い方

4. 今後の願望（必ず1問）
   - future_menuを踏まえたアップセルにつながる質問

5. NG・アレルギー（必ず1問）

【選択肢のルール】
- 選択肢は4〜5個
- お客様が「あ、これ私だ」と思える具体的な表現を使う
- 絵文字なし（テキストのみ）

必ずこのJSON形式のみで返してください（説明不要）：
[{"id":"q5","text":"質問文","type":"single","hint":"","opts":[{"e":"","l":"選択肢1"},{"e":"","l":"選択肢2"}]}]`;

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})
  });
  const data = await res.json();
  if (!data.content || !data.content[0]) throw new Error('no content');
  let text = data.content[0].text.trim();
  // JSON部分だけ抽出
  text = text.replace(/```json|```/g,'').trim();
  const jsonMatch = text.match(/\[.*\]/s);
  if (!jsonMatch) throw new Error('no json array found: ' + text.slice(0,100));
  return JSON.parse(jsonMatch[0]);
}

// ── AI: 提案生成 ──
async function generateSuggestion(ans) {
  const keyMap = {name:'お名前',gender:'性別',age:'年代',menu:'本日のメニュー',talk_style:'会話スタイル',talk_style:'会話スタイル',future_menu:'今後やってみたい施術',
    color_history:'カラー経験',color_last:'前回カラー時期',color_want:'希望の色',
    cut_length:'カット量',cut_style:'スタイル希望',perm_exp:'パーマ経験',perm_style:'希望のウェーブ',
    spa_concern:'頭皮のお悩み',treat_concern:'トリートメントのお悩み',
    lifestyle:'シャンプーの習慣',homecare:'ホームケア状況',ng:'NG事項',allergy:'アレルギー'};
  const summary = Object.entries(ans).map(([k,v])=>`${keyMap[k]||k}: ${v}`).join('\n');
  const prompt = `あなたはカウンセリング力に定評のある一流美容師です。
以下のお客様情報を徹底的に分析し、このお客様だけに響く、具体的で価値あるホームケアアドバイスを書いてください。

【お客様のカウンセリング内容】
${summary}

【絶対に守るルール】
1. このお客様の回答内容を必ず具体的に引用して、「あなたのことをちゃんと見ている」と伝わる文章にする
   例：「○○とおっしゃっていましたが、それは△△が原因です」
2. 悩みの「根本原因」を一つ特定して説明する
3. 今すぐ家でできる具体的なケアを3つ、順番に提案する（製品名は不要、方法を具体的に）
4. 今後やってみたい施術がある場合は最後に自然につなげる
5. 全体で280〜320文字
6. お客様に直接語りかける文体
7. 挨拶・お礼は不要。ケアの内容だけ
8. 「スタッフからご説明します」「サロンでご相談ください」などの逃げ文句は絶対に使わない

ホームケアアドバイス文のみ返してください。`;

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
  });
  const data = await res.json();
  return data.content[0].text.trim();
}
